name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run build:site

  conventions:
    # Enforce Conventional Branches + Conventional Commits on pull requests.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate branch name (Conventional Branches)
        run: |
          branch='${{ github.head_ref }}'
          echo "Branch: $branch"
          # Conventional Branches prefixes, plus Dependabot's generated branches.
          if ! printf '%s' "$branch" | grep -qE '^(main|(feature|feat|fix|bugfix|hotfix|release|chore|docs|test|refactor|ci|build|perf|style|revert)/.+|dependabot/.+)$'; then
            echo "::error::Branch '$branch' must follow Conventional Branches: <type>/<description> (e.g. feature/…, fix/…, chore/…)."
            exit 1
          fi
      - name: Validate PR title (Conventional Commits)
        # The repo squash-merges, so the PR title becomes the commit subject on
        # main — that's what we lint. Dependabot's titles are trusted automation
        # (sentence-cased "Bump …"), so they're exempt.
        if: github.actor != 'dependabot[bot]'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | npx commitlint --verbose
